<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Btnw</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('img-wport2.webp') center top / cover no-repeat;
      z-index: 0;
    }

    @media (min-width: 768px) {
      .bg {
        background: url('img-wport.webp') center center / cover no-repeat;
      }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.88) 0%, rgba(0, 0, 0, 0.32) 100%);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .popup {
      background: #ffffff;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      padding: 32px 30px 28px;
      text-align: left;
      position: relative;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.18);
      animation: popIn 0.32s cubic-bezier(0.34, 1.46, 0.64, 1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.82) translateY(20px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    .dialog-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .cookie-icon {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
    }

    .popup-title {
      font-size: 22px;
      font-weight: 700;
      color: #3b5998;
      line-height: 1.3;
      margin: 0;
    }

    .popup-desc {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .popup-desc a {
      color: #4267d4;
      text-decoration: none;
      font-weight: 500;
    }

    .popup-desc a:hover {
      text-decoration: underline;
    }

    .btn-row {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .btn-accept {
      background: #4267d4;
      color: #fff;
      border: none;
    }

    .btn-accept:hover {
      background: #3758b8;
      box-shadow: 0 4px 14px rgba(66, 103, 212, 0.35);
    }

    .btn-decline {
      background: #fff;
      color: #3b5998;
      border: 1.5px solid #c8d1e0;
    }

    .btn-decline:hover {
      background: #f5f7fb;
      border-color: #a0aec0;
    }

    @media (max-width: 380px) {
      .popup { padding: 24px 20px 22px; border-radius: 14px; }
      .popup-title { font-size: 20px; }
      .popup-desc { font-size: 14px; }
      .btn { font-size: 14px; padding: 11px 16px; }
    }

    @media (min-width: 768px) {
      .popup { max-width: 420px; padding: 36px 34px 30px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="overlay" id="overlay">
    <div class="popup" role="dialog" aria-modal="true" aria-labelledby="popup-title">

      <div class="dialog-header">
        <svg class="cookie-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="32" cy="32" r="30" fill="#4267d4" opacity="0.12"/>
          <path d="M32 6C17.64 6 6 17.64 6 32s11.64 26 26 26c1.2 0 2.18-.98 2.18-2.18 0-.56-.22-1.08-.58-1.48-.36-.42-.56-.96-.56-1.54 0-1.2.98-2.18 2.18-2.18H38.4c8.56 0 15.6-7.04 15.6-15.6C54 18.76 44.36 6 32 6zM16.4 32c-1.8 0-3.2-1.4-3.2-3.2s1.4-3.2 3.2-3.2 3.2 1.4 3.2 3.2-1.4 3.2-3.2 3.2zm8-12c-1.8 0-3.2-1.4-3.2-3.2s1.4-3.2 3.2-3.2 3.2 1.4 3.2 3.2-1.4 3.2-3.2 3.2zm15.2 0c-1.8 0-3.2-1.4-3.2-3.2s1.4-3.2 3.2-3.2 3.2 1.4 3.2 3.2-1.4 3.2-3.2 3.2zm8 12c-1.8 0-3.2-1.4-3.2-3.2s1.4-3.2 3.2-3.2 3.2 1.4 3.2 3.2-1.4 3.2-3.2 3.2z" fill="#4267d4"/>
        </svg>
        <h2 class="popup-title" id="popup-title">Cookies Consent</h2>
      </div>

      <p class="popup-desc">
        This website use cookies to help you have a superior and more admissible browsing
        experience on the website. <a href="javascript:void(0)" onclick="goYes()">Read more</a>
      </p>

      <div class="btn-row">
        <button class="btn btn-accept" onclick="goYes()">Accept</button>
        <button class="btn btn-decline" onclick="goNo()">Decline</button>
      </div>

    </div>
  </div>

  <script>
    var yes = 'https://record.affiliatesworld.com/_nH23majfBll606yU1fGHTmNd7ZgqdRLk/1/';
    var no  = 'https://record.affiliatesworld.com/_nH23majfBll606yU1fGHTmNd7ZgqdRLk/1/';

    function goYes() { window.location.href = yes; }
    function goNo()  { window.location.href = no;  }
  </script>

</body>
</html>
